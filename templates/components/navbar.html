<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">

    <div class="container-fluid px-4">

        <!-- Logo -->

        <a class="navbar-brand d-flex align-items-center" href="/">

            <img
                src="{{ url_for('static', filename='images/logo.png') }}"
                width="45"
                height="45"
                class="me-2">

            <div>

                <div class="fw-bold fs-5">

                    IFFCO

                </div>

                <small style="font-size:11px;opacity:.8;">

                    Fertilizer Demand Forecasting

                </small>

            </div>

        </a>

        <!-- Mobile Button -->

        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarMenu">

            <span class="navbar-toggler-icon"></span>

        </button>

        <!-- Menu -->

        <div
            class="collapse navbar-collapse"
            id="navbarMenu">

            <ul class="navbar-nav ms-auto align-items-center">

                <!-- Time -->

                <li class="nav-item me-4 d-none d-lg-block">

                    <span
                        id="liveDateTime"
                        class="text-white fw-semibold">

                    </span>

                </li>

                <!-- Notification -->

                <li class="nav-item me-3">

                    <a
                        href="#"
                        class="nav-link position-relative">

                        <i class="bi bi-bell-fill fs-5"></i>

                        <span
                            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">

                            3

                        </span>

                    </a>

                </li>

                <!-- User -->

                <li class="nav-item dropdown">

                    <a

                        class="nav-link dropdown-toggle d-flex align-items-center"

                        href="#"

                        role="button"

                        data-bs-toggle="dropdown">

                        <img

                            src="https://ui-avatars.com/api/?name={{ session.get('employee_name','Manager') }}&background=2E7D32&color=fff"

                            width="42"

                            height="42"

                            class="rounded-circle border border-light me-2">

                        <span>

                            {% if session.get("user_role")=="manager" %}

                                Manager

                            {% else %}

                                {{ session.get("employee_name") }}

                            {% endif %}

                        </span>

                    </a>

                    <ul class="dropdown-menu dropdown-menu-end shadow">

                        {% if session.get("user_role")=="employee" %}

                        <li>

                            <a
                                class="dropdown-item"
                                href="/employee/profile">

                                <i class="bi bi-person-circle me-2"></i>

                                My Profile

                            </a>

                        </li>

                        {% endif %}

                        <li>

                            <a
                                class="dropdown-item"
                                href="/about">

                                <i class="bi bi-info-circle me-2"></i>

                                About

                            </a>

                        </li>

                        <li>

                            <hr class="dropdown-divider">

                        </li>

                        <li>

                            <a
                                class="dropdown-item text-danger"
                                href="/logout">

                                <i class="bi bi-box-arrow-right me-2"></i>

                                Logout

                            </a>

                        </li>

                    </ul>

                </li>

            </ul>

        </div>

    </div>

</nav>

<script>

function updateClock(){

    const now = new Date();

    document.getElementById("liveDateTime").innerHTML =
        now.toLocaleString("en-IN",{

            weekday:"short",

            day:"2-digit",

            month:"short",

            year:"numeric",

            hour:"2-digit",

            minute:"2-digit",

            second:"2-digit"

        });

}

updateClock();

setInterval(updateClock,1000);

</script>
