{% extends "base.html" %}

{% block title %}Employee Dashboard{% endblock %}

{% block content %}

<div class="container-fluid py-4">

    <div class="row">

        <div class="col-lg-2 p-0">
            {% include 'components/sidebar.html' %}
        </div>

        <div class="col-lg-10">

            <h2 class="text-success fw-bold mb-4">
                Employee Dashboard
            </h2>

            <div class="row g-4">

                <div class="col-md-4">

                    <div class="dashboard-card text-center">

                        <h5>Total Entries</h5>

                        <h2 class="text-success mt-3">
                            0
                        </h2>

                    </div>

                </div>

                <div class="col-md-4">

                    <div class="dashboard-card text-center">

                        <h5>Today's Sales</h5>

                        <h2 class="text-primary mt-3">
                            ₹0
                        </h2>

                    </div>

                </div>

                <div class="col-md-4">

                    <div class="dashboard-card text-center">

                        <h5>Status</h5>

                        <h2 class="text-warning mt-3">
                            Active
                        </h2>

                    </div>

                </div>

            </div>

            <div class="dashboard-card mt-5">

                <h4 class="mb-3">
                    Recent Entries
                </h4>

                <div class="table-responsive">

                    <table class="table table-hover table-bordered">

                        <thead class="table-success">

                            <tr>
                                <th>Date</th>
                                <th>State</th>
                                <th>District</th>
                                <th>Product</th>
                                <th>Quantity</th>
                            </tr>

                        </thead>

                        <tbody>

                            <tr>

                                <td colspan="5" class="text-center">
                                    No Records Found
                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
